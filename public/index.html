<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cataclysm Arcade — Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app"></div>
    <!-- Real card database exported from card-studio.html. Loads BEFORE game.js. -->
    <script src="cards-data.js" onerror="console.warn('cards-data.js not found yet — build it in card-studio.html')"></script>
    <!-- Per-card ability implementations. Loads BEFORE game.js. -->
    <script src="cards-abilities.js" onerror="console.warn('cards-abilities.js not found — abilities will be manual')"></script>
    <!-- Pre-built deck library. -->
    <script src="preset-decks.js" onerror="console.warn('preset-decks.js not found')"></script>
    <script src="game.js"></script>
</body>
</html>
